<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Тур — Кванториум 3 этаж</title>
<link rel="stylesheet" href="style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
</head>
<body>

<div id="loading">
  <div id="loading-content">
    <h1>Кванториум — 3 этаж</h1>
    <p id="loading-status">Загрузка панорам…</p>
    <p id="loading-hint">Если скорость скачивания медленная — выключите VPN и проверьте сигнал сети</p>
    <div id="preload-list"></div>
    <button id="bg-load-btn">Загружать в фоне</button>
  </div>
</div>

<div id="sidebar-btn">☰</div>

<div id="sidebar">
  <div id="sidebar-header">
    <span id="sidebar-title">Комнаты</span>
    <span id="settings-btn" title="Настройки">⚙</span>
  </div>
  <div id="sidebar-list"></div>
  <div id="settings-panel" class="hidden"></div>
</div>

<div id="overlay"></div>

<div id="ui">
  <div id="scene-name"></div>
  <div id="variants"></div>
</div>

<div id="crosshair">+</div>

<script type="module" src="app.js"></script>
</body>
</html>
